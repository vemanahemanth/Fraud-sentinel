openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Fraud Detection & Alert System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: transactions
    description: Transaction management and scoring
  - name: alerts
    description: Fraud alerts and notifications
  - name: cases
    description: Case management for fraud investigators
  - name: rules
    description: Fraud rule engine configuration
  - name: users
    description: User profiles and risk scoring
  - name: merchants
    description: Merchant management and blocking
  - name: sar
    description: Suspicious Activity Reports
  - name: analytics
    description: Analytics and ML model performance
  - name: dashboard
    description: Dashboard summary data

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Transactions ──────────────────────────────────────────────────────────

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List transactions with optional filters
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: status
          in: query
          schema:
            type: string
            enum: [approved, blocked, flagged, pending_review]
        - name: riskLevel
          in: query
          schema:
            type: string
            enum: [low, medium, high, critical]
        - name: startDate
          in: query
          schema:
            type: string
            format: date-time
        - name: endDate
          in: query
          schema:
            type: string
            format: date-time
        - name: cardId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated transaction list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedTransactions"

    post:
      operationId: scoreTransaction
      tags: [transactions]
      summary: Score and process a new transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScoreTransactionBody"
      responses:
        "200":
          description: Transaction scored
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransactionScoreResult"

  /transactions/{id}:
    get:
      operationId: getTransaction
      tags: [transactions]
      summary: Get a single transaction with full details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Transaction details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions/{id}/review:
    post:
      operationId: reviewTransaction
      tags: [transactions]
      summary: Submit a manual review decision on a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewTransactionBody"
      responses:
        "200":
          description: Review submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  # ── Alerts ────────────────────────────────────────────────────────────────

  /alerts:
    get:
      operationId: listAlerts
      tags: [alerts]
      summary: List fraud alerts
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: severity
          in: query
          schema:
            type: string
            enum: [info, warning, high, critical]
        - name: status
          in: query
          schema:
            type: string
            enum: [open, acknowledged, resolved, dismissed]
      responses:
        "200":
          description: Alert list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedAlerts"

  /alerts/{id}:
    get:
      operationId: getAlert
      tags: [alerts]
      summary: Get alert details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Alert details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"

  /alerts/{id}/acknowledge:
    post:
      operationId: acknowledgeAlert
      tags: [alerts]
      summary: Acknowledge an alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Alert acknowledged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"

  /alerts/{id}/resolve:
    post:
      operationId: resolveAlert
      tags: [alerts]
      summary: Resolve an alert
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResolveAlertBody"
      responses:
        "200":
          description: Alert resolved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Alert"

  # ── Cases ─────────────────────────────────────────────────────────────────

  /cases:
    get:
      operationId: listCases
      tags: [cases]
      summary: List fraud investigation cases
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [open, in_progress, pending_sar, closed, escalated]
        - name: priority
          in: query
          schema:
            type: string
            enum: [low, medium, high, urgent]
        - name: assigneeId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Case list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedCases"

    post:
      operationId: createCase
      tags: [cases]
      summary: Create a new fraud investigation case
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCaseBody"
      responses:
        "201":
          description: Case created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"

  /cases/{id}:
    get:
      operationId: getCase
      tags: [cases]
      summary: Get case details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Case details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"

    patch:
      operationId: updateCase
      tags: [cases]
      summary: Update a fraud case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCaseBody"
      responses:
        "200":
          description: Case updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Case"

  /cases/{id}/notes:
    post:
      operationId: addCaseNote
      tags: [cases]
      summary: Add an investigation note to a case
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddCaseNoteBody"
      responses:
        "201":
          description: Note added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CaseNote"

  # ── Rules ─────────────────────────────────────────────────────────────────

  /rules:
    get:
      operationId: listRules
      tags: [rules]
      summary: List fraud detection rules
      responses:
        "200":
          description: Rules list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FraudRule"

    post:
      operationId: createRule
      tags: [rules]
      summary: Create a new fraud detection rule
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRuleBody"
      responses:
        "201":
          description: Rule created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FraudRule"

  /rules/{id}:
    patch:
      operationId: updateRule
      tags: [rules]
      summary: Update a fraud detection rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateRuleBody"
      responses:
        "200":
          description: Rule updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FraudRule"

    delete:
      operationId: deleteRule
      tags: [rules]
      summary: Delete a fraud detection rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Rule deleted

  /rules/{id}/toggle:
    post:
      operationId: toggleRule
      tags: [rules]
      summary: Enable or disable a rule
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rule toggled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FraudRule"

  # ── Users ─────────────────────────────────────────────────────────────────

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List user profiles with risk scores
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: riskTier
          in: query
          schema:
            type: string
            enum: [low, medium, high, very_high]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: User list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedUsers"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user profile with full risk profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /users/{id}/risk-score:
    get:
      operationId: getUserRiskScore
      tags: [users]
      summary: Get current risk score breakdown for a user
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Risk score
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiskScore"

  # ── Merchants ─────────────────────────────────────────────────────────────

  /merchants:
    get:
      operationId: listMerchants
      tags: [merchants]
      summary: List merchants
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [active, blocked, flagged, under_review]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Merchant list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedMerchants"

    post:
      operationId: addMerchant
      tags: [merchants]
      summary: Add a merchant to the system
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddMerchantBody"
      responses:
        "201":
          description: Merchant added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"

  /merchants/{id}/block:
    post:
      operationId: blockMerchant
      tags: [merchants]
      summary: Block a merchant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BlockMerchantBody"
      responses:
        "200":
          description: Merchant blocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"

  /merchants/{id}/unblock:
    post:
      operationId: unblockMerchant
      tags: [merchants]
      summary: Unblock a merchant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Merchant unblocked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Merchant"

  # ── SAR ───────────────────────────────────────────────────────────────────

  /sar:
    get:
      operationId: listSARs
      tags: [sar]
      summary: List Suspicious Activity Reports
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [draft, submitted, under_review, accepted, rejected]
      responses:
        "200":
          description: SAR list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedSARs"

    post:
      operationId: createSAR
      tags: [sar]
      summary: Create a new Suspicious Activity Report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSARBody"
      responses:
        "201":
          description: SAR created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SAR"

  /sar/{id}:
    get:
      operationId: getSAR
      tags: [sar]
      summary: Get a SAR by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SAR details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SAR"

    patch:
      operationId: updateSAR
      tags: [sar]
      summary: Update a SAR
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSARBody"
      responses:
        "200":
          description: SAR updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SAR"

  /sar/{id}/submit:
    post:
      operationId: submitSAR
      tags: [sar]
      summary: Submit SAR to regulators
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SAR submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SAR"

  # ── Analytics / Dashboard ─────────────────────────────────────────────────

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get real-time dashboard summary stats
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/transaction-velocity:
    get:
      operationId: getTransactionVelocity
      tags: [dashboard]
      summary: Get transaction velocity over time
      parameters:
        - name: interval
          in: query
          schema:
            type: string
            enum: [1h, 6h, 24h, 7d, 30d]
            default: 24h
      responses:
        "200":
          description: Velocity time series
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TimeSeriesPoint"

  /dashboard/alert-breakdown:
    get:
      operationId: getAlertBreakdown
      tags: [dashboard]
      summary: Get alert count breakdown by severity and type
      responses:
        "200":
          description: Alert breakdown
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlertBreakdown"

  /analytics/model-performance:
    get:
      operationId: getModelPerformance
      tags: [analytics]
      summary: Get ML model performance metrics
      parameters:
        - name: modelName
          in: query
          schema:
            type: string
            enum: [isolation_forest, autoencoder, velocity_model]
            default: isolation_forest
      responses:
        "200":
          description: Model performance metrics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelPerformance"

  /analytics/fraud-trends:
    get:
      operationId: getFraudTrends
      tags: [analytics]
      summary: Get fraud trend analytics
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [7d, 30d, 90d]
            default: 30d
      responses:
        "200":
          description: Fraud trends
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FraudTrends"

  /analytics/geolocation-heatmap:
    get:
      operationId: getGeolocationHeatmap
      tags: [analytics]
      summary: Get fraud geolocation heatmap data
      responses:
        "200":
          description: Geolocation data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GeoPoint"

  /analytics/top-risk-users:
    get:
      operationId: getTopRiskUsers
      tags: [analytics]
      summary: Get top high-risk users
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Top risk users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserRiskSummary"

  /analytics/spending-anomalies:
    get:
      operationId: getSpendingAnomalies
      tags: [analytics]
      summary: Get recent spending pattern anomalies
      responses:
        "200":
          description: Anomaly list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpendingAnomaly"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── Transaction ────────────────────────────────────────────────────────

    Transaction:
      type: object
      properties:
        id:
          type: string
        cardId:
          type: string
        userId:
          type: string
        merchantId:
          type: string
        merchantName:
          type: string
        amount:
          type: number
        currency:
          type: string
        status:
          type: string
          enum: [approved, blocked, flagged, pending_review]
        riskScore:
          type: number
          minimum: 0
          maximum: 100
        riskLevel:
          type: string
          enum: [low, medium, high, critical]
        fraudType:
          type: string
          nullable: true
        location:
          $ref: "#/components/schemas/Location"
        deviceFingerprint:
          type: string
          nullable: true
        responseTime:
          type: number
          description: Scoring latency in ms
        triggeredRules:
          type: array
          items:
            type: string
        anomalyScore:
          type: number
          nullable: true
        createdAt:
          type: string
          format: date-time
        reviewedBy:
          type: string
          nullable: true
        reviewedAt:
          type: string
          format: date-time
          nullable: true
        reviewDecision:
          type: string
          enum: [confirmed_fraud, false_positive, escalated]
          nullable: true
        reviewNotes:
          type: string
          nullable: true
      required: [id, cardId, userId, merchantId, merchantName, amount, currency, status, riskScore, riskLevel, createdAt]

    PaginatedTransactions:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Transaction"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required: [data, total, page, limit, totalPages]

    ScoreTransactionBody:
      type: object
      properties:
        cardId:
          type: string
        userId:
          type: string
        merchantId:
          type: string
        merchantName:
          type: string
        amount:
          type: number
        currency:
          type: string
        location:
          $ref: "#/components/schemas/Location"
        deviceFingerprint:
          type: string
          nullable: true
      required: [cardId, userId, merchantId, merchantName, amount, currency]

    TransactionScoreResult:
      type: object
      properties:
        transactionId:
          type: string
        decision:
          type: string
          enum: [approved, blocked, flagged, challenge_2fa]
        riskScore:
          type: number
        riskLevel:
          type: string
        responseTimeMs:
          type: number
        triggeredRules:
          type: array
          items:
            type: string
        explanation:
          type: string
      required: [transactionId, decision, riskScore, riskLevel, responseTimeMs, triggeredRules, explanation]

    ReviewTransactionBody:
      type: object
      properties:
        decision:
          type: string
          enum: [confirmed_fraud, false_positive, escalated]
        notes:
          type: string
        reviewerId:
          type: string
      required: [decision, reviewerId]

    Location:
      type: object
      properties:
        country:
          type: string
        city:
          type: string
        lat:
          type: number
        lng:
          type: number
        ipAddress:
          type: string
          nullable: true
      required: [country, city, lat, lng]

    # ── Alert ──────────────────────────────────────────────────────────────

    Alert:
      type: object
      properties:
        id:
          type: string
        transactionId:
          type: string
          nullable: true
        userId:
          type: string
          nullable: true
        type:
          type: string
          enum: [velocity_breach, geo_anomaly, device_mismatch, amount_threshold, pattern_match, ml_anomaly, blocked_merchant]
        severity:
          type: string
          enum: [info, warning, high, critical]
        status:
          type: string
          enum: [open, acknowledged, resolved, dismissed]
        title:
          type: string
        description:
          type: string
        ruleId:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        acknowledgedAt:
          type: string
          format: date-time
          nullable: true
        resolvedAt:
          type: string
          format: date-time
          nullable: true
      required: [id, type, severity, status, title, description, createdAt]

    PaginatedAlerts:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Alert"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required: [data, total, page, limit, totalPages]

    ResolveAlertBody:
      type: object
      properties:
        resolution:
          type: string
        resolvedBy:
          type: string
      required: [resolution, resolvedBy]

    # ── Case ───────────────────────────────────────────────────────────────

    Case:
      type: object
      properties:
        id:
          type: string
        caseNumber:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [open, in_progress, pending_sar, closed, escalated]
        priority:
          type: string
          enum: [low, medium, high, urgent]
        fraudType:
          type: string
        estimatedLoss:
          type: number
        confirmedLoss:
          type: number
          nullable: true
        assigneeId:
          type: string
          nullable: true
        assigneeName:
          type: string
          nullable: true
        transactionIds:
          type: array
